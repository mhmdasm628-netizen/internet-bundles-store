<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نت باكت - لوحة التحكم والاشتراكات</title>
    
    <!-- CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Almarai:wght@300;400;700;800&display=swap');
        body {
            font-family: 'Almarai', sans-serif;
            background-color: #f8fafc;
        }
        .recharts-responsive-container {
            direction: ltr;
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f5f9;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        indigo: {
                            50: '#eef2ff',
                            100: '#e0e7ff',
                            200: '#c7d2fe',
                            300: '#a5b4fc',
                            400: '#818cf8',
                            500: '#6366f1',
                            600: '#4f46e5',
                            700: '#4338ca',
                            800: '#3730a3',
                            900: '#312e81',
                        }
                    },
                    borderRadius: {
                        '2xl': '1.5rem',
                        '3xl': '2rem',
                    }
                }
            }
        }
    </script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;
        const { 
            BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer,
            PieChart, Pie, Cell
        } = Recharts;

        // --- Firebase Configuration ---
        const firebaseConfig = {
            apiKey: "AIzaSyC95TQmBZ4ufmhhf95cQtK0hg5vZHCVImw",
            authDomain: "sites-6bd6e.firebaseapp.com",
            projectId: "sites-6bd6e",
            appId: "1:1011216840446:web:1c794c47dbb9807c7f97af"
        };
        const firestoreDatabaseId = "ai-studio-a3326fe4-506a-4414-ba86-dc2ea0a35141";

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        // Note: In compat mode, databaseId is handled differently if needed, 
        // but usually default is fine. If specific DB is needed:
        // const db = firebase.app().firestore(firestoreDatabaseId);

        const ADMIN_EMAILS = ["mhmdasm628@gmail.com", "djcj1421@gmail.com"];

        // --- Lucide Icon Helper ---
        const Icon = ({ name, className, ...props }) => {
            const LucideIcon = lucide.icons[name] || lucide.icons.HelpCircle;
            return <LucideIcon className={className} {...props} />;
        };

        // --- Services ---
        const services = {
            categories: {
                getAll: async () => {
                    const snap = await db.collection('categories').orderBy('order').get();
                    return snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                },
                add: async (data) => await db.collection('categories').add(data),
                update: async (id, data) => await db.collection('categories').doc(id).update(data),
                delete: async (id) => await db.collection('categories').doc(id).delete()
            },
            packages: {
                getAll: async () => {
                    const snap = await db.collection('packages').get();
                    return snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                },
                add: async (data) => await db.collection('packages').add(data),
                update: async (id, data) => await db.collection('packages').doc(id).update(data),
                delete: async (id) => await db.collection('packages').doc(id).delete()
            },
            subscriptions: {
                subscribeToUser: (userId, callback) => {
                    return db.collection('subscriptions')
                        .where('userId', '==', userId)
                        .orderBy('createdAt', 'desc')
                        .onSnapshot(snap => {
                            callback(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                        });
                },
                subscribeToAll: (callback) => {
                    return db.collection('subscriptions')
                        .orderBy('createdAt', 'desc')
                        .onSnapshot(snap => {
                            callback(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                        });
                },
                create: async (data) => {
                    return await db.collection('subscriptions').add({
                        ...data,
                        status: 'pending',
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                },
                updateStatus: async (id, status) => {
                    return await db.collection('subscriptions').doc(id).update({ status });
                }
            },
            chat: {
                subscribeToMessages: (subId, callback) => {
                    return db.collection('subscriptions').doc(subId).collection('messages')
                        .orderBy('createdAt', 'asc')
                        .onSnapshot(snap => {
                            callback(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                        });
                },
                sendMessage: async (subId, text, senderId) => {
                    const msg = {
                        text,
                        senderId,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    };
                    await db.collection('subscriptions').doc(subId).collection('messages').add(msg);
                    await db.collection('subscriptions').doc(subId).update({
                        lastMessage: text,
                        lastMessageAt: firebase.firestore.FieldValue.serverTimestamp(),
                        lastMessageSenderId: senderId
                    });
                }
            },
            refund: {
                requestRefund: async (subId, senderPhone, refundPhone) => {
                    return await db.collection('subscriptions').doc(subId).update({
                        status: 'refund_requested',
                        refundDetails: {
                            senderPhone,
                            refundPhone,
                            requestedAt: firebase.firestore.FieldValue.serverTimestamp()
                        }
                    });
                }
            },
            settings: {
                subscribe: (callback) => {
                    return db.collection('settings').doc('main').onSnapshot(doc => {
                        callback(doc.exists ? doc.data() : null);
                    });
                },
                update: async (data) => await db.collection('settings').doc('main').set(data, { merge: true })
            },
            users: {
                subscribeToAll: (callback) => {
                    return db.collection('users').onSnapshot(snap => {
                        callback(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                    });
                },
                updateRole: async (uid, role) => await db.collection('users').doc(uid).update({ role })
            }
        };

        // --- Components ---

        const StatusBadge = ({ status }) => {
            const styles = {
                pending: "bg-orange-50 text-orange-600 border-orange-100",
                approved: "bg-emerald-50 text-emerald-600 border-emerald-100",
                rejected: "bg-red-50 text-red-600 border-red-100",
                refund_requested: "bg-indigo-50 text-indigo-600 border-indigo-100",
                refunded: "bg-slate-100 text-slate-500 border-slate-200"
            };
            const labels = {
                pending: "قيد المراجعة",
                approved: "مقبول",
                rejected: "مرفوض",
                refund_requested: "طلب استرداد",
                refunded: "تم الاسترداد"
            };
            return (
                <span className={`px-3 py-1 rounded-full text-xs font-bold border ${styles[status] || styles.pending}`}>
                    {labels[status] || status}
                </span>
            );
        };

        const Modal = ({ isOpen, onClose, title, children, maxWidth = "max-w-md" }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-[100] flex items-center justify-center p-4">
                    <div className="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onClick={onClose} />
                    <div className={`relative bg-white p-8 rounded-[2.5rem] shadow-2xl w-full ${maxWidth} max-h-[90vh] overflow-y-auto`}>
                        <div className="flex justify-between items-center mb-6">
                            <h2 className="text-2xl font-bold">{title}</h2>
                            <button onClick={onClose} className="p-2 hover:bg-slate-100 rounded-full">
                                <Icon name="X" className="w-6 h-6" />
                            </button>
                        </div>
                        {children}
                    </div>
                </div>
            );
        };

        // --- Main App ---

        function App() {
            const [user, setUser] = useState(null);
            const [isAdmin, setIsAdmin] = useState(false);
            const [isModerator, setIsModerator] = useState(false);
            const [loading, setLoading] = useState(true);
            const [view, setView] = useState('home');
            
            const [categories, setCategories] = useState([]);
            const [packages, setPackages] = useState([]);
            const [users, setUsers] = useState([]);
            const [settings, setSettings] = useState({ vodafoneCashNumber: "01012345678", isMaintenanceMode: false });
            const [selectedCategory, setSelectedCategory] = useState('all');
            const [activeSubscriptions, setActiveSubscriptions] = useState([]);
            const [allSubscriptions, setAllSubscriptions] = useState([]);
            
            const [showAuthModal, setShowAuthModal] = useState(false);
            const [showPurchaseModal, setShowPurchaseModal] = useState(null);
            const [showChatModal, setShowChatModal] = useState(null);
            const [isMenuOpen, setIsMenuOpen] = useState(false);

            // Admin Modals
            const [showAddPackage, setShowAddPackage] = useState(false);
            const [showAddCategory, setShowAddCategory] = useState(false);
            const [editingPackage, setEditingPackage] = useState(null);
            const [editingCategory, setEditingCategory] = useState(null);

            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged(async (firebaseUser) => {
                    setUser(firebaseUser);
                    if (firebaseUser) {
                        const userDoc = await db.collection('users').doc(firebaseUser.uid).get();
                        const userData = userDoc.data();
                        const role = userData?.role || (ADMIN_EMAILS.includes(firebaseUser.email) ? 'admin' : 'user');
                        
                        setIsAdmin(role === 'admin');
                        setIsModerator(role === 'admin' || role === 'moderator');

                        await db.collection('users').doc(firebaseUser.uid).set({
                            uid: firebaseUser.uid,
                            email: firebaseUser.email,
                            displayName: firebaseUser.displayName,
                            photoURL: firebaseUser.photoURL,
                            role: role
                        }, { merge: true });
                    } else {
                        setIsAdmin(false);
                        setIsModerator(false);
                    }
                    setLoading(false);
                });
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                const loadData = async () => {
                    const cats = await services.categories.getAll();
                    const pkgs = await services.packages.getAll();
                    setCategories(cats);
                    setPackages(pkgs);
                };
                loadData();

                const unsubSettings = services.settings.subscribe(s => s && setSettings(s));
                return () => unsubSettings();
            }, []);

            useEffect(() => {
                if (user) {
                    const unsub = services.subscriptions.subscribeToUser(user.uid, setActiveSubscriptions);
                    return () => unsub();
                }
            }, [user]);

            useEffect(() => {
                if (isModerator) {
                    const unsub = services.subscriptions.subscribeToAll(setAllSubscriptions);
                    let unsubUsers = () => {};
                    if (isAdmin) unsubUsers = services.users.subscribeToAll(setUsers);
                    return () => { unsub(); unsubUsers(); };
                }
            }, [isModerator, isAdmin]);

            const handleLogin = async () => {
                const provider = new firebase.auth.GoogleAuthProvider();
                await auth.signInWithPopup(provider);
                setShowAuthModal(false);
            };

            const handleLogout = async () => {
                await auth.signOut();
                setView('home');
            };

            const refreshData = async () => {
                const cats = await services.categories.getAll();
                const pkgs = await services.packages.getAll();
                setCategories(cats);
                setPackages(pkgs);
            };

            if (loading) return (
                <div className="min-h-screen flex items-center justify-center">
                    <div className="w-12 h-12 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
                </div>
            );

            const filteredPackages = selectedCategory === 'all' 
                ? packages 
                : packages.filter(p => p.categoryId === selectedCategory);

            const hasPendingSubs = allSubscriptions.some(s => s.status === 'pending');
            const hasUnreadMessages = allSubscriptions.some(s => s.lastMessageSenderId && s.lastMessageSenderId !== user?.uid);

            return (
                <div className="min-h-screen bg-slate-50 text-slate-900">
                    {/* Nav */}
                    <nav className="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-slate-200">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex justify-between items-center">
                            <div className="flex items-center gap-2 cursor-pointer" onClick={() => setView('home')}>
                                <div className="bg-indigo-600 p-2 rounded-lg text-white">
                                    <Icon name="Wifi" className="w-6 h-6" />
                                </div>
                                <span className="text-xl font-bold text-indigo-900">نت باكت</span>
                            </div>
                            
                            <div className="hidden md:flex items-center gap-6">
                                <button onClick={() => setView('home')} className={`font-bold ${view === 'home' ? 'text-indigo-600' : 'text-slate-600'}`}>الرئيسية</button>
                                {user && <button onClick={() => setView('my-subscriptions')} className={`font-bold ${view === 'my-subscriptions' ? 'text-indigo-600' : 'text-slate-600'}`}>اشتراكاتي</button>}
                                {isModerator && (
                                    <button onClick={() => setView('dashboard')} className={`font-bold relative ${view === 'dashboard' ? 'text-indigo-600' : 'text-slate-600'}`}>
                                        لوحة التحكم
                                        {(hasPendingSubs || hasUnreadMessages) && (
                                            <span className="absolute -top-1 -right-2 w-2 h-2 bg-red-500 rounded-full border border-white animate-pulse" />
                                        )}
                                    </button>
                                )}
                                {user ? (
                                    <div className="flex items-center gap-4">
                                        <div className="flex items-center gap-2 bg-slate-100 px-3 py-1 rounded-full">
                                            <img src={user.photoURL} className="w-6 h-6 rounded-full" />
                                            <span className="text-sm font-bold">{user.displayName.split(' ')[0]}</span>
                                        </div>
                                        <button onClick={handleLogout} className="text-slate-400 hover:text-red-500"><Icon name="LogOut" className="w-5 h-5" /></button>
                                    </div>
                                ) : (
                                    <button onClick={() => setShowAuthModal(true)} className="bg-indigo-600 text-white px-6 py-2 rounded-full font-bold shadow-lg shadow-indigo-100">دخول</button>
                                )}
                            </div>
                            <button className="md:hidden" onClick={() => setIsMenuOpen(!isMenuOpen)}><Icon name={isMenuOpen ? "X" : "Menu"} /></button>
                        </div>
                    </nav>

                    {/* Mobile Menu */}
                    {isMenuOpen && (
                        <div className="md:hidden bg-white border-b p-4 space-y-4">
                            <button onClick={() => {setView('home'); setIsMenuOpen(false)}} className="block w-full text-right font-bold">الرئيسية</button>
                            {user && <button onClick={() => {setView('my-subscriptions'); setIsMenuOpen(false)}} className="block w-full text-right font-bold">اشتراكاتي</button>}
                            {isModerator && <button onClick={() => {setView('dashboard'); setIsMenuOpen(false)}} className="block w-full text-right font-bold">لوحة التحكم</button>}
                            {!user ? <button onClick={() => setShowAuthModal(true)} className="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold">دخول</button> : <button onClick={handleLogout} className="w-full bg-red-50 text-red-600 py-3 rounded-xl font-bold">خروج</button>}
                        </div>
                    )}

                    <main className="max-w-7xl mx-auto px-4 py-8">
                        {view === 'home' && (
                            <div className="space-y-12">
                                <header className="text-center space-y-4">
                                    <h1 className="text-4xl font-black text-slate-900">باقات الإنترنت المميزة</h1>
                                    <p className="text-slate-500 max-w-2xl mx-auto">اختر من بين أفضل العروض والخدمات لجميع الشبكات في مصر.</p>
                                </header>
                                <div className="flex flex-wrap justify-center gap-3">
                                    <button onClick={() => setSelectedCategory('all')} className={`px-6 py-2 rounded-full font-bold border-2 transition-all ${selectedCategory === 'all' ? 'bg-indigo-600 text-white border-indigo-600' : 'bg-white text-slate-600 border-slate-200'}`}>الكل</button>
                                    {categories.map(c => (
                                        <button key={c.id} onClick={() => setSelectedCategory(c.id)} className={`px-6 py-2 rounded-full font-bold border-2 transition-all ${selectedCategory === c.id ? 'bg-indigo-600 text-white border-indigo-600' : 'bg-white text-slate-600 border-slate-200'}`}>{c.name}</button>
                                    ))}
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                                    {filteredPackages.map(pkg => (
                                        <div key={pkg.id} className="bg-white rounded-[2.5rem] overflow-hidden shadow-xl border border-slate-100 group">
                                            <div className="h-48 overflow-hidden relative">
                                                <img src={pkg.imageUrl || `https://picsum.photos/seed/${pkg.id}/600/400`} className="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500" />
                                                {pkg.stock <= 0 && <div className="absolute inset-0 bg-black/60 flex items-center justify-center"><span className="bg-red-600 text-white px-4 py-1 rounded-full font-bold">نفذت الكمية</span></div>}
                                            </div>
                                            <div className="p-8 space-y-6">
                                                <h3 className="text-2xl font-bold">{pkg.name}</h3>
                                                <p className="text-slate-500 text-sm line-clamp-2">{pkg.description}</p>
                                                <div className="flex justify-between items-center">
                                                    <div className="flex items-baseline gap-1"><span className="text-3xl font-black text-indigo-600">{pkg.price}</span><span className="text-slate-400 text-sm">جنية</span></div>
                                                    <div className="flex gap-4 text-xs font-bold text-slate-400">
                                                        <div className="flex items-center gap-1"><Icon name="Zap" className="w-3 h-3" /> {pkg.speed}</div>
                                                        <div className="flex items-center gap-1"><Icon name="BarChart3" className="w-3 h-3" /> {pkg.quota}</div>
                                                    </div>
                                                </div>
                                                <button onClick={() => user ? setShowPurchaseModal(pkg) : setShowAuthModal(true)} disabled={pkg.stock <= 0} className={`w-full py-4 rounded-2xl font-bold shadow-lg transition-all ${pkg.stock <= 0 ? 'bg-slate-200 text-slate-400' : 'bg-indigo-600 text-white hover:bg-indigo-700 shadow-indigo-100'}`}>شراء الباقة</button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {view === 'my-subscriptions' && (
                            <div className="space-y-8">
                                <h1 className="text-3xl font-bold">اشتراكاتي</h1>
                                {activeSubscriptions.length === 0 ? (
                                    <div className="bg-white p-12 rounded-[2.5rem] text-center border-2 border-dashed border-slate-200">
                                        <Icon name="Clock" className="w-16 h-16 text-slate-300 mx-auto mb-4" />
                                        <p className="text-slate-500">لا توجد اشتراكات حالياً.</p>
                                    </div>
                                ) : (
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                        {activeSubscriptions.map(sub => (
                                            <div key={sub.id} className="bg-white p-6 rounded-[2rem] shadow-lg border border-slate-100 space-y-6">
                                                <div className="flex justify-between items-start">
                                                    <div>
                                                        <h3 className="text-xl font-bold">{sub.packageName}</h3>
                                                        <p className="text-slate-400 text-sm">تاريخ الطلب: {sub.createdAt?.toDate()?.toLocaleDateString('ar-EG')}</p>
                                                    </div>
                                                    <StatusBadge status={sub.status} />
                                                </div>
                                                <div className="flex gap-3">
                                                    {sub.status === 'approved' && (
                                                        <button onClick={() => setShowChatModal(sub)} className="flex-1 bg-indigo-600 text-white py-3 rounded-xl font-bold flex items-center justify-center gap-2 relative">
                                                            <Icon name="MessageSquare" className="w-5 h-5" /> تواصل مع المشرف
                                                            {sub.lastMessageSenderId && sub.lastMessageSenderId !== user?.uid && (
                                                                <span className="absolute top-2 right-2 w-2.5 h-2.5 bg-red-500 rounded-full border-2 border-white animate-pulse" />
                                                            )}
                                                        </button>
                                                    )}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        )}

                        {view === 'dashboard' && isModerator && (
                            <DashboardView 
                                categories={categories} 
                                packages={packages} 
                                subscriptions={allSubscriptions} 
                                users={users} 
                                isAdmin={isAdmin} 
                                isModerator={isModerator}
                                onRefresh={refreshData}
                                onOpenChat={setShowChatModal}
                                user={user}
                                settings={settings}
                                setSettings={setSettings}
                            />
                        )}
                    </main>

                    {/* Modals */}
                    <Modal isOpen={showAuthModal} onClose={() => setShowAuthModal(false)} title="تسجيل الدخول">
                        <div className="text-center space-y-6">
                            <div className="bg-indigo-100 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto"><Icon name="User" className="text-indigo-600 w-8 h-8" /></div>
                            <p className="text-slate-500">يرجى تسجيل الدخول لمتابعة عمليات الشراء.</p>
                            <button onClick={handleLogin} className="w-full bg-white border-2 border-slate-200 py-4 rounded-2xl font-bold flex items-center justify-center gap-3 hover:bg-slate-50 transition-all">
                                <img src="https://www.google.com/favicon.ico" className="w-5 h-5" /> الدخول بواسطة جوجل
                            </button>
                        </div>
                    </Modal>

                    <Modal isOpen={!!showPurchaseModal} onClose={() => setShowPurchaseModal(null)} title="تأكيد شراء الباقة">
                        {settings.isMaintenanceMode ? (
                            <div className="text-center space-y-4">
                                <Icon name="AlertCircle" className="w-12 h-12 text-red-500 mx-auto" />
                                <h3 className="text-xl font-bold">الموقع قيد الصيانة</h3>
                                <p className="text-slate-500">عمليات الشراء متوقفة حالياً.</p>
                            </div>
                        ) : (
                            <PurchaseForm pkg={showPurchaseModal} settings={settings} user={user} onClose={() => setShowPurchaseModal(null)} />
                        )}
                    </Modal>

                    <ChatModal 
                        isOpen={!!showChatModal} 
                        onClose={() => setShowChatModal(null)} 
                        subscription={showChatModal} 
                        user={user} 
                        isAdmin={isAdmin} 
                        isModerator={isModerator} 
                    />

                    {isAdmin && (
                        <>
                            <Modal isOpen={showAddPackage || !!editingPackage} onClose={() => {setShowAddPackage(false); setEditingPackage(null)}} title={editingPackage ? "تعديل باقة" : "إضافة باقة"}>
                                <PackageForm categories={categories} editingPackage={editingPackage} onSuccess={refreshData} onClose={() => {setShowAddPackage(false); setEditingPackage(null)}} />
                            </Modal>
                            <Modal isOpen={showAddCategory || !!editingCategory} onClose={() => {setShowAddCategory(false); setEditingCategory(null)}} title={editingCategory ? "تعديل فئة" : "إضافة فئة"}>
                                <CategoryForm editingCategory={editingCategory} onSuccess={refreshData} onClose={() => {setShowAddCategory(false); setEditingCategory(null)}} />
                            </Modal>
                        </>
                    )}
                </div>
            );
        }

        // --- Sub-Components ---

        function PurchaseForm({ pkg, settings, user, onClose }) {
            const [phone, setPhone] = useState('');
            const [loading, setLoading] = useState(false);
            const handleSubmit = async (e) => {
                e.preventDefault();
                setLoading(true);
                await services.subscriptions.create({
                    userId: user.uid,
                    userEmail: user.email,
                    packageId: pkg.id,
                    packageName: pkg.name,
                    price: pkg.price,
                    senderPhone: phone
                });
                setLoading(false);
                alert('تم إرسال طلبك بنجاح!');
                onClose();
            };
            return (
                <form onSubmit={handleSubmit} className="space-y-6">
                    <div className="bg-indigo-50 p-6 rounded-2xl space-y-4">
                        <div className="flex justify-between"><span>الباقة:</span><span className="font-bold">{pkg.name}</span></div>
                        <div className="flex justify-between"><span>المبلغ:</span><span className="font-bold">{pkg.price} ج.م</span></div>
                        <div className="pt-4 border-t border-indigo-100">
                            <p className="text-xs text-slate-500 mb-2">حول المبلغ إلى:</p>
                            <div className="bg-white p-3 rounded-xl border border-indigo-200 flex justify-between items-center">
                                <span className="font-mono font-bold text-lg">{settings.vodafoneCashNumber}</span>
                                <button type="button" onClick={() => navigator.clipboard.writeText(settings.vodafoneCashNumber)} className="text-indigo-600 text-xs">نسخ</button>
                            </div>
                        </div>
                    </div>
                    <div>
                        <label className="block text-sm font-bold mb-2">الرقم الذي قمت بالتحويل منه</label>
                        <input required type="tel" value={phone} onChange={e => setPhone(e.target.value)} className="w-full px-5 py-4 bg-slate-50 border rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500" placeholder="01xxxxxxxxx" />
                    </div>
                    <button disabled={loading} className="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold hover:bg-indigo-700 disabled:opacity-50">تأكيد الإرسال</button>
                </form>
            );
        }

        function DashboardView({ categories, packages, subscriptions, users, isAdmin, isModerator, onRefresh, onOpenChat, user, settings, setSettings }) {
            const [tab, setTab] = useState(isAdmin ? 'stats' : 'subs');
            const [statsRange, setStatsRange] = useState('all');

            const filteredSubs = useMemo(() => {
                if (statsRange === 'all') return subscriptions;
                const now = new Date();
                return subscriptions.filter(s => {
                    const date = s.createdAt?.toDate();
                    if (!date) return false;
                    if (statsRange === 'today') return date.toDateString() === now.toDateString();
                    if (statsRange === '3days') {
                        const threeDaysAgo = new Date();
                        threeDaysAgo.setDate(now.getDate() - 3);
                        return date >= threeDaysAgo;
                    }
                    return true;
                });
            }, [subscriptions, statsRange]);

            const totalSales = filteredSubs.filter(s => s.status === 'approved').reduce((acc, s) => acc + (s.price || 0), 0);
            const activeCount = filteredSubs.filter(s => s.status === 'approved').length;
            const pendingCount = filteredSubs.filter(s => s.status === 'pending').length;

            const chartData = useMemo(() => {
                const salesByDay = filteredSubs.filter(s => s.status === 'approved').reduce((acc, s) => {
                    const date = new Date(s.createdAt?.toDate()).toLocaleDateString('ar-EG', { month: 'short', day: 'numeric' });
                    acc[date] = (acc[date] || 0) + s.price;
                    return acc;
                }, {});
                return Object.entries(salesByDay).map(([name, value]) => ({ name, value })).slice(-7);
            }, [filteredSubs]);

            const hasPending = subscriptions.some(s => s.status === 'pending');
            const hasUnread = subscriptions.some(s => s.lastMessageSenderId && s.lastMessageSenderId !== user?.uid);

            return (
                <div className="space-y-8">
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                        <div className="bg-white p-6 rounded-3xl shadow-lg border flex items-center gap-4">
                            <div className="bg-emerald-100 p-3 rounded-2xl text-emerald-600"><Icon name="DollarSign" /></div>
                            <div><div className="text-xs text-slate-400 font-bold">المبيعات</div><div className="text-2xl font-black">{totalSales} ج.م</div></div>
                        </div>
                        <div className="bg-white p-6 rounded-3xl shadow-lg border flex items-center gap-4">
                            <div className="bg-indigo-100 p-3 rounded-2xl text-indigo-600"><Icon name="CheckCircle2" /></div>
                            <div><div className="text-xs text-slate-400 font-bold">النشطة</div><div className="text-2xl font-black">{activeCount}</div></div>
                        </div>
                        <div className="bg-white p-6 rounded-3xl shadow-lg border flex items-center gap-4">
                            <div className="bg-orange-100 p-3 rounded-2xl text-orange-600"><Icon name="Clock" /></div>
                            <div><div className="text-xs text-slate-400 font-bold">المعلقة</div><div className="text-2xl font-black">{pendingCount}</div></div>
                        </div>
                        <div className="bg-white p-6 rounded-3xl shadow-lg border flex items-center gap-4">
                            <div className="bg-blue-100 p-3 rounded-2xl text-blue-600"><Icon name="Users" /></div>
                            <div><div className="text-xs text-slate-400 font-bold">الأعضاء</div><div className="text-2xl font-black">{users.length}</div></div>
                        </div>
                    </div>

                    <div className="flex gap-4 border-b overflow-x-auto">
                        {isAdmin && <button onClick={() => setTab('stats')} className={`px-6 py-3 font-bold border-b-2 ${tab === 'stats' ? 'border-indigo-600 text-indigo-600' : 'border-transparent text-slate-400'}`}>الإحصائيات</button>}
                        <button onClick={() => setTab('subs')} className={`px-6 py-3 font-bold border-b-2 relative ${tab === 'subs' ? 'border-indigo-600 text-indigo-600' : 'border-transparent text-slate-400'}`}>
                            الطلبات
                            {(hasPending || hasUnread) && <span className="absolute top-2 right-2 w-2 h-2 bg-red-500 rounded-full border border-white animate-pulse" />}
                        </button>
                        {isAdmin && <button onClick={() => setTab('packages')} className={`px-6 py-3 font-bold border-b-2 ${tab === 'packages' ? 'border-indigo-600 text-indigo-600' : 'border-transparent text-slate-400'}`}>الباقات</button>}
                        {isAdmin && <button onClick={() => setTab('categories')} className={`px-6 py-3 font-bold border-b-2 ${tab === 'categories' ? 'border-indigo-600 text-indigo-600' : 'border-transparent text-slate-400'}`}>الفئات</button>}
                        {isAdmin && <button onClick={() => setTab('users')} className={`px-6 py-3 font-bold border-b-2 ${tab === 'users' ? 'border-indigo-600 text-indigo-600' : 'border-transparent text-slate-400'}`}>الأعضاء</button>}
                        {isAdmin && <button onClick={() => setTab('settings')} className={`px-6 py-3 font-bold border-b-2 ${tab === 'settings' ? 'border-indigo-600 text-indigo-600' : 'border-transparent text-slate-400'}`}>الإعدادات</button>}
                    </div>

                    <div className="bg-white rounded-3xl shadow-xl border overflow-hidden min-h-[400px]">
                        {tab === 'stats' && (
                            <div className="p-8 space-y-8">
                                <div className="flex gap-2">
                                    {['today', '3days', 'all'].map(r => (
                                        <button key={r} onClick={() => setStatsRange(r)} className={`px-4 py-2 rounded-xl text-sm font-bold ${statsRange === r ? 'bg-indigo-600 text-white' : 'bg-slate-100 text-slate-600'}`}>{r === 'today' ? 'اليوم' : r === '3days' ? '3 أيام' : 'الكل'}</button>
                                    ))}
                                </div>
                                <div className="h-[300px] w-full">
                                    <ResponsiveContainer width="100%" height="100%">
                                        <BarChart data={chartData}>
                                            <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#f1f5f9" />
                                            <XAxis dataKey="name" axisLine={false} tickLine={false} />
                                            <YAxis axisLine={false} tickLine={false} />
                                            <Tooltip contentStyle={{borderRadius: '1rem', border: 'none'}} />
                                            <Bar dataKey="value" fill="#4f46e5" radius={[4, 4, 0, 0]} />
                                        </BarChart>
                                    </ResponsiveContainer>
                                </div>
                            </div>
                        )}

                        {tab === 'subs' && (
                            <div className="overflow-x-auto">
                                <table className="w-full text-right">
                                    <thead className="bg-slate-50 border-b">
                                        <tr>
                                            <th className="px-6 py-4 font-bold">العميل</th>
                                            <th className="px-6 py-4 font-bold">الباقة</th>
                                            <th className="px-6 py-4 font-bold">الرقم</th>
                                            <th className="px-6 py-4 font-bold">الحالة</th>
                                            <th className="px-6 py-4 font-bold">الإجراءات</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y">
                                        {subscriptions.map(sub => (
                                            <tr key={sub.id} className="hover:bg-slate-50/50">
                                                <td className="px-6 py-4">
                                                    <div className="font-bold text-sm">{sub.userEmail}</div>
                                                    {sub.status === 'refund_requested' && sub.refundDetails && (
                                                        <div className="mt-2 p-2 bg-red-50 rounded-lg text-xs border border-red-100">
                                                            <div className="font-bold text-red-700">طلب استرداد:</div>
                                                            <div>من: {sub.refundDetails.senderPhone}</div>
                                                            <div>إلى: {sub.refundDetails.refundPhone}</div>
                                                        </div>
                                                    )}
                                                </td>
                                                <td className="px-6 py-4">{sub.packageName}</td>
                                                <td className="px-6 py-4 font-mono text-indigo-600">{sub.senderPhone}</td>
                                                <td className="px-6 py-4"><StatusBadge status={sub.status} /></td>
                                                <td className="px-6 py-4">
                                                    <div className="flex gap-2">
                                                        {isAdmin && sub.status === 'pending' && <button onClick={() => services.subscriptions.updateStatus(sub.id, 'approved')} className="p-2 bg-emerald-50 text-emerald-600 rounded-lg"><Icon name="Check" className="w-4 h-4" /></button>}
                                                        {isModerator && sub.status === 'pending' && <button onClick={() => services.subscriptions.updateStatus(sub.id, 'rejected')} className="p-2 bg-red-50 text-red-600 rounded-lg"><Icon name="X" className="w-4 h-4" /></button>}
                                                        {sub.status === 'approved' && (
                                                            <button onClick={() => onOpenChat(sub)} className="p-2 bg-indigo-50 text-indigo-600 rounded-lg relative">
                                                                <Icon name="MessageSquare" className="w-4 h-4" />
                                                                {sub.lastMessageSenderId && sub.lastMessageSenderId !== user?.uid && <span className="absolute -top-1 -right-1 w-2 h-2 bg-red-500 rounded-full border border-white" />}
                                                            </button>
                                                        )}
                                                        {isAdmin && sub.status === 'refund_requested' && (
                                                            <button onClick={() => services.subscriptions.updateStatus(sub.id, 'refunded')} className="px-3 py-1 bg-orange-50 text-orange-600 rounded-lg text-xs font-bold">تأكيد الاسترداد</button>
                                                        )}
                                                    </div>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        )}

                        {tab === 'packages' && (
                            <div className="p-6 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                {packages.map(pkg => (
                                    <div key={pkg.id} className="bg-slate-50 p-4 rounded-2xl border flex gap-4">
                                        <img src={pkg.imageUrl} className="w-16 h-16 rounded-xl object-cover" />
                                        <div className="flex-1">
                                            <h4 className="font-bold text-sm">{pkg.name}</h4>
                                            <p className="text-xs text-slate-400">{pkg.price} ج.م</p>
                                            <div className="flex gap-2 mt-2">
                                                <button onClick={() => setEditingPackage(pkg)} className="text-slate-400 hover:text-indigo-600"><Icon name="Edit2" className="w-4 h-4" /></button>
                                                <button onClick={() => confirm('حذف؟') && services.packages.delete(pkg.id).then(onRefresh)} className="text-slate-400 hover:text-red-500"><Icon name="Trash2" className="w-4 h-4" /></button>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {tab === 'users' && (
                            <div className="overflow-x-auto">
                                <table className="w-full text-right">
                                    <thead className="bg-slate-50 border-b">
                                        <tr><th className="px-6 py-4 font-bold">المستخدم</th><th className="px-6 py-4 font-bold">الصلاحية</th><th className="px-6 py-4 font-bold">تغيير</th></tr>
                                    </thead>
                                    <tbody className="divide-y">
                                        {users.map(u => (
                                            <tr key={u.id}>
                                                <td className="px-6 py-4 flex items-center gap-3"><img src={u.photoURL} className="w-8 h-8 rounded-full" /><span className="font-bold">{u.displayName}</span></td>
                                                <td className="px-6 py-4"><span className={`px-3 py-1 rounded-full text-[10px] font-bold ${u.role === 'admin' ? 'bg-red-50 text-red-600' : 'bg-slate-100'}`}>{u.role}</span></td>
                                                <td className="px-6 py-4">
                                                    <select value={u.role} onChange={e => services.users.updateRole(u.id, e.target.value)} className="bg-slate-50 border rounded-lg px-2 py-1 text-xs">
                                                        <option value="user">عضو</option><option value="moderator">مشرف</option><option value="admin">مدير</option>
                                                    </select>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        )}

                        {tab === 'settings' && (
                            <div className="p-8 max-w-md mx-auto space-y-6">
                                <div>
                                    <label className="block text-sm font-bold mb-2">رقم فودافون كاش</label>
                                    <input type="text" value={settings.vodafoneCashNumber} onChange={e => setSettings({...settings, vodafoneCashNumber: e.target.value})} className="w-full px-5 py-4 bg-slate-50 border rounded-2xl outline-none" />
                                </div>
                                <div className="flex items-center justify-between bg-slate-50 p-4 rounded-2xl border">
                                    <div><div className="font-bold">وضع الصيانة</div><div className="text-xs text-slate-400">إيقاف الشراء مؤقتاً</div></div>
                                    <button onClick={() => setSettings({...settings, isMaintenanceMode: !settings.isMaintenanceMode})} className={`w-12 h-6 rounded-full relative transition-all ${settings.isMaintenanceMode ? 'bg-indigo-600' : 'bg-slate-300'}`}>
                                        <div className={`absolute top-1 w-4 h-4 bg-white rounded-full transition-all ${settings.isMaintenanceMode ? 'right-7' : 'right-1'}`} />
                                    </button>
                                </div>
                                <button onClick={() => services.settings.update(settings).then(() => alert('تم الحفظ'))} className="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold">حفظ الإعدادات</button>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        function ChatModal({ isOpen, onClose, subscription, user, isAdmin, isModerator }) {
            const [messages, setMessages] = useState([]);
            const [text, setText] = useState('');
            const [showRefund, setShowRefund] = useState(false);
            const [refundData, setRefundData] = useState({ senderPhone: subscription?.senderPhone || '', refundPhone: '' });
            const scrollRef = useRef();

            useEffect(() => {
                if (isOpen && subscription) {
                    const unsub = services.chat.subscribeToMessages(subscription.id, msgs => {
                        setMessages(msgs);
                        setTimeout(() => scrollRef.current?.scrollIntoView({ behavior: 'smooth' }), 100);
                    });
                    return () => unsub();
                }
            }, [isOpen, subscription]);

            if (!isOpen || !subscription) return null;

            const handleSend = async (e) => {
                e.preventDefault();
                if (!text.trim()) return;
                await services.chat.sendMessage(subscription.id, text, user.uid);
                setText('');
            };

            const handleRefund = async (e) => {
                e.preventDefault();
                await services.refund.requestRefund(subscription.id, refundData.senderPhone, refundData.refundPhone);
                setShowRefund(false);
                alert('تم طلب الاسترداد');
            };

            return (
                <div className="fixed inset-0 z-[100] flex items-center justify-center p-4">
                    <div className="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onClick={onClose} />
                    <div className="relative bg-white w-full max-w-2xl h-[80vh] rounded-[2.5rem] shadow-2xl flex flex-col overflow-hidden">
                        <div className="p-6 bg-indigo-600 text-white flex justify-between items-center">
                            <div className="flex items-center gap-4">
                                <div><h3 className="font-bold">محادثة: {subscription.packageName}</h3><p className="text-xs opacity-80">{subscription.userEmail}</p></div>
                                {(isAdmin || isModerator) && subscription.status === 'approved' && (
                                    <button onClick={() => setShowRefund(!showRefund)} className="bg-red-500 px-3 py-1 rounded-xl text-xs font-bold">طلب استرداد</button>
                                )}
                            </div>
                            <button onClick={onClose}><Icon name="X" /></button>
                        </div>
                        {showRefund && (
                            <div className="p-6 bg-red-50 border-b">
                                <form onSubmit={handleRefund} className="space-y-4">
                                    <div className="grid grid-cols-2 gap-4">
                                        <input required value={refundData.senderPhone} onChange={e => setRefundData({...refundData, senderPhone: e.target.value})} className="p-3 rounded-xl border text-sm" placeholder="الرقم المحول منه" />
                                        <input required value={refundData.refundPhone} onChange={e => setRefundData({...refundData, refundPhone: e.target.value})} className="p-3 rounded-xl border text-sm" placeholder="الرقم المراد التحويل له" />
                                    </div>
                                    <button className="w-full bg-red-600 text-white py-2 rounded-xl font-bold text-sm">تأكيد طلب الاسترداد</button>
                                </form>
                            </div>
                        )}
                        <div className="flex-1 overflow-y-auto p-6 space-y-4 bg-slate-50">
                            {messages.map(msg => (
                                <div key={msg.id} className={`flex ${msg.senderId === user.uid ? 'justify-start' : 'justify-end'}`}>
                                    <div className={`max-w-[80%] p-4 rounded-2xl text-sm shadow-sm ${msg.senderId === user.uid ? 'bg-indigo-600 text-white rounded-tr-none' : 'bg-white text-slate-800 rounded-tl-none'}`}>{msg.text}</div>
                                </div>
                            ))}
                            <div ref={scrollRef} />
                        </div>
                        <form onSubmit={handleSend} className="p-6 bg-white border-t flex gap-3">
                            <input value={text} onChange={e => setText(e.target.value)} className="flex-1 px-5 py-3 bg-slate-50 border rounded-xl outline-none" placeholder="اكتب رسالتك..." />
                            <button className="bg-indigo-600 text-white p-3 rounded-xl"><Icon name="Send" className="rotate-180" /></button>
                        </form>
                    </div>
                </div>
            );
        }

        function PackageForm({ categories, editingPackage, onSuccess, onClose }) {
            const [form, setForm] = useState(editingPackage || { name: '', description: '', price: 0, imageUrl: '', categoryId: '', speed: '', quota: '', stock: 0 });
            const handleSubmit = async (e) => {
                e.preventDefault();
                const data = { ...form, price: Number(form.price), stock: Number(form.stock) };
                if (editingPackage) await services.packages.update(editingPackage.id, data);
                else await services.packages.add(data);
                onSuccess(); onClose();
            };
            return (
                <form onSubmit={handleSubmit} className="grid grid-cols-2 gap-4">
                    <div className="col-span-2"><label className="block text-xs font-bold mb-1">الاسم</label><input required value={form.name} onChange={e => setForm({...form, name: e.target.value})} className="w-full p-3 bg-slate-50 border rounded-xl" /></div>
                    <div className="col-span-2"><label className="block text-xs font-bold mb-1">الوصف</label><textarea required value={form.description} onChange={e => setForm({...form, description: e.target.value})} className="w-full p-3 bg-slate-50 border rounded-xl h-20" /></div>
                    <div><label className="block text-xs font-bold mb-1">السعر</label><input required type="number" value={form.price} onChange={e => setForm({...form, price: e.target.value})} className="w-full p-3 bg-slate-50 border rounded-xl" /></div>
                    <div><label className="block text-xs font-bold mb-1">الفئة</label><select required value={form.categoryId} onChange={e => setForm({...form, categoryId: e.target.value})} className="w-full p-3 bg-slate-50 border rounded-xl">{categories.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}</select></div>
                    <div><label className="block text-xs font-bold mb-1">السرعة</label><input required value={form.speed} onChange={e => setForm({...form, speed: e.target.value})} className="w-full p-3 bg-slate-50 border rounded-xl" /></div>
                    <div><label className="block text-xs font-bold mb-1">السعة</label><input required value={form.quota} onChange={e => setForm({...form, quota: e.target.value})} className="w-full p-3 bg-slate-50 border rounded-xl" /></div>
                    <div><label className="block text-xs font-bold mb-1">المخزون</label><input required type="number" value={form.stock} onChange={e => setForm({...form, stock: e.target.value})} className="w-full p-3 bg-slate-50 border rounded-xl" /></div>
                    <div className="col-span-2"><label className="block text-xs font-bold mb-1">رابط الصورة</label><input required value={form.imageUrl} onChange={e => setForm({...form, imageUrl: e.target.value})} className="w-full p-3 bg-slate-50 border rounded-xl" /></div>
                    <button className="col-span-2 bg-indigo-600 text-white py-4 rounded-xl font-bold mt-4">حفظ</button>
                </form>
            );
        }

        function CategoryForm({ editingCategory, onSuccess, onClose }) {
            const [name, setName] = useState(editingCategory?.name || '');
            const handleSubmit = async (e) => {
                e.preventDefault();
                if (editingCategory) await services.categories.update(editingCategory.id, { name });
                else await services.categories.add({ name, order: Date.now() });
                onSuccess(); onClose();
            };
            return (
                <form onSubmit={handleSubmit} className="space-y-4">
                    <input required value={name} onChange={e => setName(e.target.value)} className="w-full p-4 bg-slate-50 border rounded-xl" placeholder="اسم الفئة" />
                    <button className="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold">حفظ</button>
                </form>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
