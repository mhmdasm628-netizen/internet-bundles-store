<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نت باكت - النسخة الكاملة</title>
    
    <!-- CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    
    <!-- Firebase SDKs (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Almarai:wght@300;400;700;800&display=swap');
        body { font-family: 'Almarai', sans-serif; background-color: #f8fafc; }
        .recharts-responsive-container { direction: ltr; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        indigo: { 50: '#eef2ff', 100: '#e0e7ff', 200: '#c7d2fe', 300: '#a5b4fc', 400: '#818cf8', 500: '#6366f1', 600: '#4f46e5', 700: '#4338ca', 800: '#3730a3', 900: '#312e81' }
                    }
                }
            }
        }
    </script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;
        const { motion, AnimatePresence } = FramerMotion;
        const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, PieChart, Pie, Cell } = Recharts;

        // --- Firebase Config ---
        const firebaseConfig = {
            apiKey: "AIzaSyC95TQmBZ4ufmhhf95cQtK0hg5vZHCVImw",
            authDomain: "sites-6bd6e.firebaseapp.com",
            projectId: "sites-6bd6e",
            appId: "1:1011216840446:web:1c794c47dbb9807c7f97af"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const ADMIN_EMAILS = ["mhmdasm628@gmail.com", "djcj1421@gmail.com"];

        // --- Helpers ---
        const Icon = ({ name, className, ...props }) => {
            const LucideIcon = lucide.icons[name] || lucide.icons.HelpCircle;
            return <LucideIcon className={className} {...props} />;
        };

        const cn = (...classes) => classes.filter(Boolean).join(' ');

        // --- Services ---
        const services = {
            categories: {
                getAll: async () => (await db.collection('categories').orderBy('order').get()).docs.map(d => ({id: d.id, ...d.data()})),
                add: (d) => db.collection('categories').add(d),
                update: (id, d) => db.collection('categories').doc(id).update(d),
                delete: (id) => db.collection('categories').doc(id).delete()
            },
            packages: {
                getAll: async () => (await db.collection('packages').get()).docs.map(d => ({id: d.id, ...d.data()})),
                add: (d) => db.collection('packages').add({...d, isActive: true}),
                update: (id, d) => db.collection('packages').doc(id).update(d),
                delete: (id) => db.collection('packages').doc(id).delete()
            },
            subscriptions: {
                subscribeToUser: (uid, cb) => db.collection('subscriptions').where('userId', '==', uid).orderBy('createdAt', 'desc').onSnapshot(s => cb(s.docs.map(d => ({id: d.id, ...d.data()})))),
                subscribeToAll: (cb) => db.collection('subscriptions').orderBy('createdAt', 'desc').onSnapshot(s => cb(s.docs.map(d => ({id: d.id, ...d.data()})))),
                create: async (d) => {
                    const pkgRef = db.collection('packages').doc(d.packageId);
                    const pkg = await pkgRef.get();
                    if (pkg.exists && pkg.data().stock > 0) await pkgRef.update({ stock: pkg.data().stock - 1 });
                    return db.collection('subscriptions').add({...d, status: 'pending', createdAt: firebase.firestore.FieldValue.serverTimestamp()});
                },
                updateStatus: (id, status) => db.collection('subscriptions').doc(id).update({ status, updatedAt: firebase.firestore.FieldValue.serverTimestamp() })
            },
            chat: {
                subscribe: (subId, cb) => db.collection('chatMessages').where('subscriptionId', '==', subId).orderBy('createdAt', 'asc').onSnapshot(s => cb(s.docs.map(d => ({id: d.id, ...d.data()})))),
                send: async (subId, text, senderId) => {
                    await db.collection('chatMessages').add({ subscriptionId: subId, text, senderId, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
                    await db.collection('subscriptions').doc(subId).update({ lastMessageText: text, lastMessageAt: firebase.firestore.FieldValue.serverTimestamp(), lastMessageSenderId: senderId });
                }
            },
            settings: {
                subscribe: (cb) => db.collection('settings').doc('global').onSnapshot(d => cb(d.exists ? d.data() : null)),
                update: (d) => db.collection('settings').doc('global').set(d, {merge: true})
            }
        };

        // --- Main App ---
        function App() {
            const [user, setUser] = useState(null);
            const [isAdmin, setIsAdmin] = useState(false);
            const [isModerator, setIsModerator] = useState(false);
            const [view, setView] = useState('home');
            const [loading, setLoading] = useState(true);
            
            const [categories, setCategories] = useState([]);
            const [packages, setPackages] = useState([]);
            const [allSubs, setAllSubs] = useState([]);
            const [mySubs, setMySubs] = useState([]);
            const [settings, setSettings] = useState({ vodafoneCashNumber: "01012345678", isMaintenanceMode: false });
            
            const [selectedCat, setSelectedCat] = useState('all');
            const [showAuth, setShowAuth] = useState(false);
            const [showPurchase, setShowPurchase] = useState(null);
            const [showChat, setShowChat] = useState(null);

            useEffect(() => {
                const unsub = auth.onAuthStateChanged(async (u) => {
                    setUser(u);
                    if (u) {
                        const doc = await db.collection('users').doc(u.uid).get();
                        const role = doc.data()?.role || (ADMIN_EMAILS.includes(u.email) ? 'admin' : 'user');
                        setIsAdmin(role === 'admin');
                        setIsModerator(role === 'admin' || role === 'moderator');
                        await db.collection('users').doc(u.uid).set({ uid: u.uid, email: u.email, displayName: u.displayName, photoURL: u.photoURL, role }, {merge: true});
                    }
                    setLoading(false);
                });
                return unsub;
            }, []);

            useEffect(() => {
                services.categories.getAll().then(setCategories);
                services.packages.getAll().then(setPackages);
                services.settings.subscribe(s => s && setSettings(s));
            }, []);

            useEffect(() => {
                if (user) return services.subscriptions.subscribeToUser(user.uid, setMySubs);
            }, [user]);

            useEffect(() => {
                if (isModerator) return services.subscriptions.subscribeToAll(setAllSubs);
            }, [isModerator]);

            const handleLogin = () => auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()).then(() => setShowAuth(false));
            const handleLogout = () => auth.signOut().then(() => setView('home'));

            if (loading) return <div className="min-h-screen flex items-center justify-center"><div className="w-10 h-10 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin"></div></div>;

            const filteredPkgs = selectedCat === 'all' ? packages : packages.filter(p => p.categoryId === selectedCat);
            const hasPending = allSubs.some(s => s.status === 'pending');
            const hasUnread = allSubs.some(s => s.lastMessageSenderId && s.lastMessageSenderId !== user?.uid);

            return (
                <div className="min-h-screen bg-slate-50">
                    <nav className="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-slate-200 h-16 flex items-center">
                        <div className="max-w-7xl mx-auto px-4 w-full flex justify-between items-center">
                            <div className="flex items-center gap-2 cursor-pointer" onClick={() => setView('home')}>
                                <div className="bg-indigo-600 p-2 rounded-lg text-white"><Icon name="Wifi" className="w-5 h-5" /></div>
                                <span className="text-xl font-bold text-indigo-900">نت باكت</span>
                            </div>
                            <div className="hidden md:flex items-center gap-6">
                                <button onClick={() => setView('home')} className={cn("font-bold", view === 'home' ? "text-indigo-600" : "text-slate-600")}>الرئيسية</button>
                                {user && <button onClick={() => setView('my-subscriptions')} className={cn("font-bold", view === 'my-subscriptions' ? "text-indigo-600" : "text-slate-600")}>اشتراكاتي</button>}
                                {isModerator && (
                                    <button onClick={() => setView('dashboard')} className={cn("font-bold relative", view === 'dashboard' ? "text-indigo-600" : "text-slate-600")}>
                                        لوحة التحكم
                                        {(hasPending || hasUnread) && <span className="absolute -top-1 -right-2 w-2 h-2 bg-red-500 rounded-full border border-white animate-pulse" />}
                                    </button>
                                )}
                                {user ? (
                                    <div className="flex items-center gap-3">
                                        <div className="flex items-center gap-2 bg-slate-100 px-3 py-1 rounded-full"><img src={user.photoURL} className="w-6 h-6 rounded-full" /><span className="text-xs font-bold">{user.displayName.split(' ')[0]}</span></div>
                                        <button onClick={handleLogout} className="text-slate-400 hover:text-red-500"><Icon name="LogOut" className="w-4 h-4" /></button>
                                    </div>
                                ) : (
                                    <button onClick={() => setShowAuth(true)} className="bg-indigo-600 text-white px-5 py-2 rounded-full font-bold">دخول</button>
                                )}
                            </div>
                        </div>
                    </nav>

                    <main className="max-w-7xl mx-auto px-4 py-8">
                        {view === 'home' && <HomeView categories={categories} packages={filteredPkgs} selectedCat={selectedCat} setSelectedCat={setSelectedCat} onBuy={p => user ? setShowPurchase(p) : setShowAuth(true)} />}
                        {view === 'my-subscriptions' && <MySubsView subs={mySubs} onChat={setShowChat} user={user} />}
                        {view === 'dashboard' && isModerator && <DashboardView categories={categories} packages={packages} subs={allSubs} isAdmin={isAdmin} user={user} settings={settings} onChat={setShowChat} onRefresh={() => { services.categories.getAll().then(setCategories); services.packages.getAll().then(setPackages); }} />}
                    </main>

                    <AuthModal isOpen={showAuth} onClose={() => setShowAuth(false)} onLogin={handleLogin} />
                    <PurchaseModal isOpen={!!showPurchase} onClose={() => setShowPurchase(null)} pkg={showPurchase} user={user} settings={settings} />
                    <ChatModal isOpen={!!showChat} onClose={() => setShowChat(null)} sub={showChat} user={user} isAdmin={isAdmin} />
                </div>
            );
        }

        // --- Sub Views ---
        function HomeView({ categories, packages, selectedCat, setSelectedCat, onBuy }) {
            return (
                <div className="space-y-10">
                    <div className="text-center space-y-4">
                        <h1 className="text-4xl font-black text-slate-900">باقات الإنترنت المميزة</h1>
                        <p className="text-slate-500 max-w-xl mx-auto">أفضل العروض والخدمات لجميع الشبكات في مصر.</p>
                    </div>
                    <div className="flex flex-wrap justify-center gap-2">
                        <button onClick={() => setSelectedCat('all')} className={cn("px-5 py-2 rounded-full font-bold border-2 transition-all", selectedCat === 'all' ? "bg-indigo-600 text-white border-indigo-600" : "bg-white text-slate-600 border-slate-200")}>الكل</button>
                        {categories.map(c => <button key={c.id} onClick={() => setSelectedCat(c.id)} className={cn("px-5 py-2 rounded-full font-bold border-2 transition-all", selectedCat === c.id ? "bg-indigo-600 text-white border-indigo-600" : "bg-white text-slate-600 border-slate-200")}>{c.name}</button>)}
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                        {packages.map(p => (
                            <motion.div layout key={p.id} className="bg-white rounded-[2rem] overflow-hidden shadow-xl border border-slate-100 flex flex-col">
                                <div className="h-44 relative overflow-hidden">
                                    <img src={p.imageUrl || `https://picsum.photos/seed/${p.id}/600/400`} className="w-full h-full object-cover" />
                                    {p.stock <= 0 && <div className="absolute inset-0 bg-black/60 flex items-center justify-center"><span className="bg-red-600 text-white px-4 py-1 rounded-full font-bold">نفذت الكمية</span></div>}
                                </div>
                                <div className="p-6 space-y-4 flex-1 flex flex-col">
                                    <h3 className="text-xl font-bold">{p.name}</h3>
                                    <p className="text-slate-500 text-sm line-clamp-2 flex-1">{p.description}</p>
                                    <div className="flex justify-between items-center pt-4">
                                        <div className="flex items-baseline gap-1"><span className="text-2xl font-black text-indigo-600">{p.price}</span><span className="text-slate-400 text-xs">جنية</span></div>
                                        <div className="flex gap-3 text-[10px] font-bold text-slate-400">
                                            <div className="flex items-center gap-1"><Icon name="Zap" className="w-3 h-3" /> {p.speed}</div>
                                            <div className="flex items-center gap-1"><Icon name="BarChart3" className="w-3 h-3" /> {p.quota}</div>
                                        </div>
                                    </div>
                                    <button onClick={() => onBuy(p)} disabled={p.stock <= 0} className={cn("w-full py-3 rounded-xl font-bold transition-all", p.stock <= 0 ? "bg-slate-100 text-slate-400" : "bg-indigo-600 text-white hover:bg-indigo-700 shadow-lg shadow-indigo-100")}>شراء الآن</button>
                                </div>
                            </motion.div>
                        ))}
                    </div>
                </div>
            );
        }

        function MySubsView({ subs, onChat, user }) {
            return (
                <div className="space-y-8">
                    <h1 className="text-3xl font-bold">اشتراكاتي</h1>
                    {subs.length === 0 ? (
                        <div className="bg-white p-12 rounded-3xl text-center border-2 border-dashed border-slate-200">
                            <Icon name="Clock" className="w-12 h-12 text-slate-300 mx-auto mb-4" />
                            <p className="text-slate-500">لا توجد طلبات حالياً.</p>
                        </div>
                    ) : (
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                            {subs.map(s => (
                                <div key={s.id} className="bg-white p-6 rounded-3xl shadow-lg border border-slate-100 space-y-4">
                                    <div className="flex justify-between items-start">
                                        <div><h3 className="font-bold text-lg">{s.packageName}</h3><p className="text-slate-400 text-xs">{s.createdAt?.toDate()?.toLocaleDateString('ar-EG')}</p></div>
                                        <StatusBadge status={s.status} />
                                    </div>
                                    {s.status === 'approved' && (
                                        <button onClick={() => onChat(s)} className="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold flex items-center justify-center gap-2 relative">
                                            <Icon name="MessageSquare" className="w-4 h-4" /> تواصل مع المشرف
                                            {s.lastMessageSenderId && s.lastMessageSenderId !== user?.uid && <span className="absolute top-2 right-2 w-2 h-2 bg-red-500 rounded-full border-2 border-white animate-pulse" />}
                                        </button>
                                    )}
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );
        }

        function DashboardView({ categories, packages, subs, isAdmin, user, settings, onChat, onRefresh }) {
            const [tab, setTab] = useState(isAdmin ? 'stats' : 'subs');
            const [showAddPkg, setShowAddPkg] = useState(false);
            const [showAddCat, setShowAddCat] = useState(false);
            const [editPkg, setEditPkg] = useState(null);
            const [editCat, setEditCat] = useState(null);

            const stats = useMemo(() => {
                const approved = subs.filter(s => s.status === 'approved');
                const total = approved.reduce((a, b) => a + (b.price || 0), 0);
                const salesByDay = approved.reduce((acc, s) => {
                    const d = s.createdAt?.toDate()?.toLocaleDateString('ar-EG', {month:'short', day:'numeric'});
                    acc[d] = (acc[d] || 0) + s.price;
                    return acc;
                }, {});
                const chartData = Object.entries(salesByDay).map(([name, value]) => ({name, value})).slice(-7);
                return { total, approvedCount: approved.length, pendingCount: subs.filter(s => s.status === 'pending').length, chartData };
            }, [subs]);

            return (
                <div className="space-y-8">
                    <div className="flex justify-between items-center">
                        <h1 className="text-3xl font-bold">لوحة التحكم</h1>
                        {isAdmin && (
                            <div className="flex gap-2">
                                <button onClick={() => setShowAddCat(true)} className="bg-white border px-4 py-2 rounded-xl text-sm font-bold flex items-center gap-2"><Icon name="Plus" className="w-4 h-4" /> فئة</button>
                                <button onClick={() => setShowAddPkg(true)} className="bg-indigo-600 text-white px-4 py-2 rounded-xl text-sm font-bold flex items-center gap-2"><Icon name="Plus" className="w-4 h-4" /> باقة</button>
                            </div>
                        )}
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div className="bg-white p-6 rounded-3xl shadow-lg border flex items-center gap-4">
                            <div className="bg-emerald-100 p-3 rounded-2xl text-emerald-600"><Icon name="DollarSign" /></div>
                            <div><div className="text-xs text-slate-400 font-bold">المبيعات</div><div className="text-2xl font-black">{stats.total} ج.م</div></div>
                        </div>
                        <div className="bg-white p-6 rounded-3xl shadow-lg border flex items-center gap-4">
                            <div className="bg-indigo-100 p-3 rounded-2xl text-indigo-600"><Icon name="CheckCircle2" /></div>
                            <div><div className="text-xs text-slate-400 font-bold">النشطة</div><div className="text-2xl font-black">{stats.approvedCount}</div></div>
                        </div>
                        <div className="bg-white p-6 rounded-3xl shadow-lg border flex items-center gap-4">
                            <div className="bg-orange-100 p-3 rounded-2xl text-orange-600"><Icon name="Clock" /></div>
                            <div><div className="text-xs text-slate-400 font-bold">المعلقة</div><div className="text-2xl font-black">{stats.pendingCount}</div></div>
                        </div>
                    </div>

                    <div className="flex gap-4 border-b overflow-x-auto">
                        {isAdmin && <button onClick={() => setTab('stats')} className={cn("px-6 py-3 font-bold border-b-2", tab === 'stats' ? "border-indigo-600 text-indigo-600" : "border-transparent text-slate-400")}>الإحصائيات</button>}
                        <button onClick={() => setTab('subs')} className={cn("px-6 py-3 font-bold border-b-2 relative", tab === 'subs' ? "border-indigo-600 text-indigo-600" : "border-transparent text-slate-400")}>الطلبات {subs.some(s => s.status === 'pending' || (s.lastMessageSenderId && s.lastMessageSenderId !== user?.uid)) && <span className="absolute top-2 right-2 w-2 h-2 bg-red-500 rounded-full border border-white animate-pulse" />}</button>
                        {isAdmin && <button onClick={() => setTab('packages')} className={cn("px-6 py-3 font-bold border-b-2", tab === 'packages' ? "border-indigo-600 text-indigo-600" : "border-transparent text-slate-400")}>الباقات</button>}
                        {isAdmin && <button onClick={() => setTab('settings')} className={cn("px-6 py-3 font-bold border-b-2", tab === 'settings' ? "border-indigo-600 text-indigo-600" : "border-transparent text-slate-400")}>الإعدادات</button>}
                    </div>

                    <div className="bg-white rounded-3xl shadow-xl border overflow-hidden min-h-[400px]">
                        {tab === 'stats' && (
                            <div className="p-8 h-[400px]">
                                <h3 className="font-bold mb-6">نمو المبيعات</h3>
                                <ResponsiveContainer width="100%" height="100%">
                                    <BarChart data={stats.chartData}>
                                        <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#f1f5f9" />
                                        <XAxis dataKey="name" axisLine={false} tickLine={false} />
                                        <YAxis axisLine={false} tickLine={false} />
                                        <Tooltip contentStyle={{borderRadius:'1rem', border:'none'}} />
                                        <Bar dataKey="value" fill="#4f46e5" radius={[4, 4, 0, 0]} />
                                    </BarChart>
                                </ResponsiveContainer>
                            </div>
                        )}
                        {tab === 'subs' && (
                            <div className="overflow-x-auto">
                                <table className="w-full text-right">
                                    <thead className="bg-slate-50 border-b">
                                        <tr><th className="px-6 py-4">العميل</th><th className="px-6 py-4">الباقة</th><th className="px-6 py-4">الرقم</th><th className="px-6 py-4">الحالة</th><th className="px-6 py-4">الإجراءات</th></tr>
                                    </thead>
                                    <tbody className="divide-y">
                                        {subs.map(s => (
                                            <tr key={s.id} className="hover:bg-slate-50/50">
                                                <td className="px-6 py-4">
                                                    <div className="font-bold text-sm">{s.userEmail}</div>
                                                    {s.status === 'refund_requested' && s.refundDetails && (
                                                        <div className="mt-2 p-2 bg-red-50 rounded-lg text-[10px] border border-red-100 text-red-700">
                                                            <div>من: {s.refundDetails.senderPhone}</div><div>إلى: {s.refundDetails.refundPhone}</div>
                                                        </div>
                                                    )}
                                                </td>
                                                <td className="px-6 py-4 text-sm">{s.packageName}</td>
                                                <td className="px-6 py-4 font-mono text-indigo-600 text-sm">{s.senderPhone}</td>
                                                <td className="px-6 py-4"><StatusBadge status={s.status} /></td>
                                                <td className="px-6 py-4">
                                                    <div className="flex gap-2">
                                                        {isAdmin && s.status === 'pending' && <button onClick={() => services.subscriptions.updateStatus(s.id, 'approved')} className="p-2 bg-emerald-50 text-emerald-600 rounded-lg"><Icon name="Check" className="w-4 h-4" /></button>}
                                                        {s.status === 'approved' && (
                                                            <button onClick={() => onChat(s)} className="p-2 bg-indigo-50 text-indigo-600 rounded-lg relative">
                                                                <Icon name="MessageSquare" className="w-4 h-4" />
                                                                {s.lastMessageSenderId && s.lastMessageSenderId !== user?.uid && <span className="absolute -top-1 -right-1 w-2 h-2 bg-red-500 rounded-full border border-white" />}
                                                            </button>
                                                        )}
                                                        {isAdmin && s.status === 'refund_requested' && <button onClick={() => services.subscriptions.updateStatus(s.id, 'refunded')} className="px-3 py-1 bg-orange-50 text-orange-600 rounded-lg text-[10px] font-bold">تأكيد الاسترداد</button>}
                                                    </div>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        )}
                        {tab === 'packages' && (
                            <div className="p-6 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                                {packages.map(p => (
                                    <div key={p.id} className="bg-slate-50 p-4 rounded-2xl border flex gap-4 items-center">
                                        <img src={p.imageUrl} className="w-12 h-12 rounded-lg object-cover" />
                                        <div className="flex-1">
                                            <h4 className="font-bold text-xs">{p.name}</h4>
                                            <p className="text-[10px] text-slate-400">{p.price} ج.م</p>
                                        </div>
                                        <div className="flex gap-1">
                                            <button onClick={() => setEditPkg(p)} className="p-1.5 text-slate-400 hover:text-indigo-600"><Icon name="Edit2" className="w-3 h-3" /></button>
                                            <button onClick={() => confirm('حذف؟') && services.packages.delete(p.id).then(onRefresh)} className="p-1.5 text-slate-400 hover:text-red-500"><Icon name="Trash2" className="w-3 h-3" /></button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                        {tab === 'settings' && (
                            <div className="p-8 max-w-md mx-auto space-y-6">
                                <div><label className="block text-sm font-bold mb-2">رقم فودافون كاش</label><input type="text" value={settings.vodafoneCashNumber} onChange={e => setSettings({...settings, vodafoneCashNumber: e.target.value})} className="w-full px-5 py-3 bg-slate-50 border rounded-xl outline-none" /></div>
                                <div className="flex items-center justify-between bg-slate-50 p-4 rounded-xl border">
                                    <div><div className="font-bold text-sm">وضع الصيانة</div><div className="text-[10px] text-slate-400">إيقاف الشراء مؤقتاً</div></div>
                                    <button onClick={() => setSettings({...settings, isMaintenanceMode: !settings.isMaintenanceMode})} className={`w-10 h-5 rounded-full relative transition-all ${settings.isMaintenanceMode ? 'bg-indigo-600' : 'bg-slate-300'}`}><div className={`absolute top-0.5 w-4 h-4 bg-white rounded-full transition-all ${settings.isMaintenanceMode ? 'right-5.5' : 'right-0.5'}`} /></button>
                                </div>
                                <button onClick={() => services.settings.update(settings).then(() => alert('تم الحفظ'))} className="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold">حفظ الإعدادات</button>
                            </div>
                        )}
                    </div>

                    <Modal isOpen={showAddPkg || !!editPkg} onClose={() => {setShowAddPkg(false); setEditPkg(null)}} title={editPkg ? "تعديل باقة" : "إضافة باقة"}>
                        <PackageForm categories={categories} editPkg={editPkg} onSuccess={() => {onRefresh(); setShowAddPkg(false); setEditPkg(null)}} />
                    </Modal>
                    <Modal isOpen={showAddCat || !!editCat} onClose={() => {setShowAddCat(false); setEditCat(null)}} title={editCat ? "تعديل فئة" : "إضافة فئة"}>
                        <CategoryForm editCat={editCat} onSuccess={() => {onRefresh(); setShowAddCat(false); setEditCat(null)}} />
                    </Modal>
                </div>
            );
        }

        // --- Modals ---
        function Modal({ isOpen, onClose, title, children }) {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-[100] flex items-center justify-center p-4">
                    <div className="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onClick={onClose} />
                    <div className="relative bg-white p-8 rounded-[2.5rem] shadow-2xl w-full max-w-md max-h-[90vh] overflow-y-auto">
                        <div className="flex justify-between items-center mb-6"><h2 className="text-2xl font-bold">{title}</h2><button onClick={onClose} className="p-2 hover:bg-slate-100 rounded-full"><Icon name="X" /></button></div>
                        {children}
                    </div>
                </div>
            );
        }

        function AuthModal({ isOpen, onClose, onLogin }) {
            return (
                <Modal isOpen={isOpen} onClose={onClose} title="تسجيل الدخول">
                    <div className="text-center space-y-6">
                        <div className="bg-indigo-100 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto text-indigo-600"><Icon name="User" className="w-8 h-8" /></div>
                        <p className="text-slate-500">يرجى تسجيل الدخول لمتابعة عمليات الشراء.</p>
                        <button onClick={onLogin} className="w-full bg-white border-2 border-slate-200 py-4 rounded-2xl font-bold flex items-center justify-center gap-3 hover:bg-slate-50 transition-all">
                            <img src="https://www.google.com/favicon.ico" className="w-5 h-5" /> الدخول بواسطة جوجل
                        </button>
                    </div>
                </Modal>
            );
        }

        function PurchaseModal({ isOpen, onClose, pkg, user, settings }) {
            const [phone, setPhone] = useState('');
            const [loading, setLoading] = useState(false);
            if (!pkg) return null;
            const handleSubmit = async (e) => {
                e.preventDefault();
                setLoading(true);
                await services.subscriptions.create({ userId: user.uid, userEmail: user.email, packageId: pkg.id, packageName: pkg.name, price: pkg.price, senderPhone: phone });
                setLoading(false);
                alert('تم إرسال طلبك بنجاح!');
                onClose();
            };
            return (
                <Modal isOpen={isOpen} onClose={onClose} title="تأكيد الشراء">
                    {settings.isMaintenanceMode ? <div className="text-center py-4 text-red-600 font-bold">الموقع قيد الصيانة حالياً</div> : (
                        <form onSubmit={handleSubmit} className="space-y-6">
                            <div className="bg-indigo-50 p-5 rounded-2xl space-y-3 text-sm">
                                <div className="flex justify-between"><span>الباقة:</span><span className="font-bold">{pkg.name}</span></div>
                                <div className="flex justify-between"><span>المبلغ:</span><span className="font-bold">{pkg.price} ج.م</span></div>
                                <div className="pt-3 border-t border-indigo-100">
                                    <p className="text-[10px] text-slate-500 mb-1">حول المبلغ إلى:</p>
                                    <div className="bg-white p-3 rounded-xl border border-indigo-200 flex justify-between items-center"><span className="font-mono font-bold text-lg">{settings.vodafoneCashNumber}</span><button type="button" onClick={() => navigator.clipboard.writeText(settings.vodafoneCashNumber)} className="text-indigo-600 text-xs">نسخ</button></div>
                                </div>
                            </div>
                            <div><label className="block text-xs font-bold mb-2">الرقم الذي قمت بالتحويل منه</label><input required type="tel" value={phone} onChange={e => setPhone(e.target.value)} className="w-full px-5 py-3 bg-slate-50 border rounded-xl outline-none" placeholder="01xxxxxxxxx" /></div>
                            <button disabled={loading} className="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold disabled:opacity-50">تأكيد الطلب</button>
                        </form>
                    )}
                </Modal>
            );
        }

        function ChatModal({ isOpen, onClose, sub, user, isAdmin }) {
            const [msgs, setMsgs] = useState([]);
            const [text, setText] = useState('');
            const [showRefund, setShowRefund] = useState(false);
            const [refundData, setRefundData] = useState({ senderPhone: sub?.senderPhone || '', refundPhone: '' });
            const scrollRef = useRef();

            useEffect(() => {
                if (isOpen && sub) return services.chat.subscribe(sub.id, m => { setMsgs(m); setTimeout(() => scrollRef.current?.scrollIntoView({behavior:'smooth'}), 100); });
            }, [isOpen, sub]);

            if (!isOpen || !sub) return null;

            const send = async (e) => {
                e.preventDefault();
                if (!text.trim()) return;
                await services.chat.send(sub.id, text, user.uid);
                setText('');
            };

            const refund = async (e) => {
                e.preventDefault();
                await db.collection('subscriptions').doc(sub.id).update({ status: 'refund_requested', refundDetails: { ...refundData, createdAt: firebase.firestore.FieldValue.serverTimestamp() } });
                setShowRefund(false);
                alert('تم طلب الاسترداد');
            };

            return (
                <div className="fixed inset-0 z-[100] flex items-center justify-center p-4">
                    <div className="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onClick={onClose} />
                    <div className="relative bg-white w-full max-w-2xl h-[80vh] rounded-[2.5rem] shadow-2xl flex flex-col overflow-hidden">
                        <div className="p-5 bg-indigo-600 text-white flex justify-between items-center">
                            <div><h3 className="font-bold">{sub.packageName}</h3><p className="text-[10px] opacity-80">{sub.userEmail}</p></div>
                            <div className="flex gap-2">
                                {isAdmin && sub.status === 'approved' && <button onClick={() => setShowRefund(!showRefund)} className="bg-red-500 px-3 py-1 rounded-lg text-[10px] font-bold">طلب استرداد</button>}
                                <button onClick={onClose}><Icon name="X" /></button>
                            </div>
                        </div>
                        {showRefund && (
                            <div className="p-5 bg-red-50 border-b">
                                <form onSubmit={refund} className="grid grid-cols-2 gap-3">
                                    <input required value={refundData.senderPhone} onChange={e => setRefundData({...refundData, senderPhone: e.target.value})} className="p-2 border rounded-lg text-xs" placeholder="الرقم المرسل" />
                                    <input required value={refundData.refundPhone} onChange={e => setRefundData({...refundData, refundPhone: e.target.value})} className="p-2 border rounded-lg text-xs" placeholder="رقم الاسترداد" />
                                    <button className="col-span-2 bg-red-600 text-white py-2 rounded-lg text-xs font-bold">تأكيد</button>
                                </form>
                            </div>
                        )}
                        <div className="flex-1 overflow-y-auto p-6 space-y-4 bg-slate-50">
                            {msgs.map(m => (
                                <div key={m.id} className={cn("flex", m.senderId === user.uid ? "justify-start" : "justify-end")}>
                                    <div className={cn("max-w-[80%] p-3 rounded-2xl text-sm shadow-sm", m.senderId === user.uid ? "bg-indigo-600 text-white rounded-tr-none" : "bg-white text-slate-800 rounded-tl-none")}>{m.text}</div>
                                </div>
                            ))}
                            <div ref={scrollRef} />
                        </div>
                        <form onSubmit={send} className="p-4 bg-white border-t flex gap-2">
                            <input value={text} onChange={e => setText(e.target.value)} className="flex-1 px-4 py-2 bg-slate-50 border rounded-xl outline-none text-sm" placeholder="اكتب رسالتك..." />
                            <button className="bg-indigo-600 text-white p-2 rounded-xl"><Icon name="Send" className="rotate-180 w-5 h-5" /></button>
                        </form>
                    </div>
                </div>
            );
        }

        function StatusBadge({ status }) {
            const styles = { pending: "bg-orange-50 text-orange-600 border-orange-100", approved: "bg-emerald-50 text-emerald-600 border-emerald-100", rejected: "bg-red-50 text-red-600 border-red-100", refund_requested: "bg-indigo-50 text-indigo-600 border-indigo-100", refunded: "bg-slate-100 text-slate-500 border-slate-200" };
            const labels = { pending: "قيد المراجعة", approved: "مقبول", rejected: "مرفوض", refund_requested: "طلب استرداد", refunded: "تم الاسترداد" };
            return <span className={cn("px-2 py-0.5 rounded-full text-[10px] font-bold border", styles[status])}>{labels[status]}</span>;
        }

        function PackageForm({ categories, editPkg, onSuccess }) {
            const [f, setF] = useState(editPkg || { name: '', description: '', price: 0, imageUrl: '', categoryId: '', speed: '', quota: '', stock: 0 });
            const sub = async (e) => {
                e.preventDefault();
                const d = { ...f, price: Number(f.price), stock: Number(f.stock) };
                if (editPkg) await services.packages.update(editPkg.id, d); else await services.packages.add(d);
                onSuccess();
            };
            return (
                <form onSubmit={sub} className="grid grid-cols-2 gap-3 text-xs">
                    <div className="col-span-2"><label className="font-bold">الاسم</label><input required value={f.name} onChange={e => setF({...f, name: e.target.value})} className="w-full p-2 border rounded-lg" /></div>
                    <div className="col-span-2"><label className="font-bold">الوصف</label><textarea required value={f.description} onChange={e => setF({...f, description: e.target.value})} className="w-full p-2 border rounded-lg h-16" /></div>
                    <div><label className="font-bold">السعر</label><input required type="number" value={f.price} onChange={e => setF({...f, price: e.target.value})} className="w-full p-2 border rounded-lg" /></div>
                    <div><label className="font-bold">الفئة</label><select required value={f.categoryId} onChange={e => setF({...f, categoryId: e.target.value})} className="w-full p-2 border rounded-lg">{categories.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}</select></div>
                    <div><label className="font-bold">السرعة</label><input required value={f.speed} onChange={e => setF({...f, speed: e.target.value})} className="w-full p-2 border rounded-lg" /></div>
                    <div><label className="font-bold">السعة</label><input required value={f.quota} onChange={e => setF({...f, quota: e.target.value})} className="w-full p-2 border rounded-lg" /></div>
                    <div className="col-span-2"><label className="font-bold">رابط الصورة</label><input required value={f.imageUrl} onChange={e => setF({...f, imageUrl: e.target.value})} className="w-full p-2 border rounded-lg" /></div>
                    <button className="col-span-2 bg-indigo-600 text-white py-3 rounded-xl font-bold mt-2">حفظ</button>
                </form>
            );
        }

        function CategoryForm({ editCat, onSuccess }) {
            const [n, setN] = useState(editCat?.name || '');
            const sub = async (e) => {
                e.preventDefault();
                if (editCat) await services.categories.update(editCat.id, {name: n}); else await services.categories.add({name: n, order: Date.now()});
                onSuccess();
            };
            return (
                <form onSubmit={sub} className="space-y-4">
                    <input required value={n} onChange={e => setN(e.target.value)} className="w-full p-3 border rounded-xl" placeholder="اسم الفئة" />
                    <button className="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold">حفظ</button>
                </form>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
