<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نت باكت | أسرع شحن باقات</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

    <style>
        body { font-family: 'Tajawal', sans-serif; }
        .animate-fade { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <script type="text/babel">
        // 1. إعدادات فايربيز (تأكد من مسح أي حروف غريبة مثل U+202A)
        const firebaseConfig = {
            apiKey: "AIzaSyCi1a7pMvUyDpkVEPwjhTaYz0Qec", 
            authDomain: "internet-f0683.firebaseapp.com",
            projectId: "internet-f0683",
            storageBucket: "internet-f0683.firebasestorage.app",
            messagingSenderId: "288697957962",
            appId: "1:288697957962:web:b18cc2fa518a4289"
        };

        // تشغيل فايربيز
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();

        function App() {
            const [view, setView] = React.useState('user');
            const [loading, setLoading] = React.useState(true);

            // تجربة الاتصال بقاعدة البيانات
            React.useEffect(() => {
                setTimeout(() => setLoading(false), 1000);
            }, []);

            if (loading) return <div class="flex h-screen items-center justify-center text-xl font-bold">جاري تحميل نت باكت...</div>;

            return (
                <div className="min-h-screen animate-fade">
                    <nav className="bg-blue-600 p-4 text-white shadow-lg flex justify-between items-center">
                        <span className="text-2xl font-black">نِت باكت 🌐</span>
                        <button onClick={() => setView(view === 'user' ? 'admin' : 'user')} className="bg-white text-blue-600 px-4 py-1 rounded-full font-bold text-sm">
                            {view === 'user' ? 'لوحة المسؤول' : 'العودة للمحل'}
                        </button>
                    </nav>

                    <div className="p-6 max-w-4xl mx-auto">
                        {view === 'user' ? (
                            <div className="space-y-6">
                                <div className="bg-blue-50 border-r-4 border-blue-500 p-4 rounded">
                                    <h2 className="font-bold text-blue-800">أهلاً بك!</h2>
                                    <p className="text-sm text-blue-600">اختر نوع الشبكة وابدأ الشحن فوراً.</p>
                                </div>
                                <div className="grid grid-cols-1 gap-4">
                                    <div className="bg-white p-6 rounded-xl shadow-sm border hover:border-blue-500 transition-all">
                                        <h3 className="text-xl font-bold text-red-600">فودافون مصر</h3>
                                        <p className="text-gray-500 text-sm">أقوى باقات الموبايل والإنترنت</p>
                                    </div>
                                    <div className="bg-white p-6 rounded-xl shadow-sm border hover:border-blue-500 transition-all">
                                        <h3 className="text-xl font-bold text-green-600">اتصالات من e&</h3>
                                        <p className="text-gray-500 text-sm">باقات حكاية وخدمات الـ VIP</p>
                                    </div>
                                </div>
                            </div>
                        ) : (
                            <div className="bg-white p-8 rounded-2xl shadow-xl border-t-8 border-orange-500">
                                <h2 className="text-2xl font-black mb-4">لوحة التحكم ⚙️</h2>
                                <p className="text-gray-600 mb-6">مرحباً يا بطل، هنا ستظهر الطلبات الجديدة قريباً.</p>
                                <div className="grid grid-cols-2 gap-4">
                                    <div className="bg-gray-50 p-4 rounded text-center">
                                        <div className="text-2xl font-bold">0</div>
                                        <div className="text-xs text-gray-500">مبيعات اليوم</div>
                                    </div>
                                    <div className="bg-gray-50 p-4 rounded text-center">
                                        <div className="text-2xl font-bold">0</div>
                                        <div className="text-xs text-gray-500">طلبات معلقة</div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
