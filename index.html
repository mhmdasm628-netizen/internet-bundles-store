<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نت باكت</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        function App() {
            return (
                <div className="min-h-screen bg-blue-600 flex items-center justify-center p-4">
                    <div className="bg-white p-8 rounded-3xl shadow-2xl text-center max-w-sm w-full">
                        <h1 className="text-4xl font-black text-blue-600 mb-4">نِت باكت 🌐</h1>
                        <p className="text-gray-600 mb-6 font-bold">الموقع اشتغل يا بطل! جاهز نرفع بقية الباقات؟</p>
                        <button className="bg-blue-600 text-white w-full py-3 rounded-xl font-bold hover:bg-blue-700 transition-colors">
                            استمرار
                        </button>
                    </div>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
