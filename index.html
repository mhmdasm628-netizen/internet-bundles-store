<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نت باكت | أرخص باقات إنترنت</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        body { font-family: 'Tajawal', sans-serif; }
        .card-anim { transition: all 0.3s ease; }
        .card-anim:hover { transform: translateY(-5px); border-color: #2563eb; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const firebaseConfig = {
            apiKey: "AIzaSyCi1a7pMvUyDpkVEPwjhTaYz0Qec", 
            authDomain: "internet-f0683.firebaseapp.com",
            projectId: "internet-f0683",
            storageBucket: "internet-f0683.firebasestorage.app",
            messagingSenderId: "288697957962",
            appId: "1:288697957962:web:b18cc2fa518a4289"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function App() {
            const [view, setView] = React.useState('user'); 
            const [selectedNet, setSelectedNet] = React.useState(null);

            return (
                <div className="min-h-screen">
                    <nav className="bg-white border-b p-4 flex justify-between items-center sticky top-0 z-50">
                        <h1 className="text-2xl font-black text-blue-600">نِت باكت</h1>
                        <button 
                            onClick={() => setView(view === 'user' ? 'admin' : 'user')}
                            className="bg-blue-50 text-blue-600 px-4 py-2 rounded-xl font-bold text-sm"
                        >
                            {view === 'user' ? 'لوحة الإدارة' : 'العودة للمتجر'}
                        </button>
                    </nav>

                    <main className="max-w-4xl mx-auto p-6">
                        {view === 'user' ? (
                            <div>
                                {!selectedNet ? (
                                    <div className="space-y-6">
                                        <div className="bg-blue-600 p-8 rounded-3xl text-white text-center shadow-xl">
                                            <h2 className="text-3xl font-black mb-2">أهلاً بك يا بطل!</h2>
                                            <p className="opacity-90">اختر شبكتك وابدأ شحن باقتك في ثواني</p>
                                        </div>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                            <button onClick={() => setSelectedNet('vodafone')} className="bg-white p-6 rounded-2xl border-2 border-transparent card-anim shadow-sm text-right">
                                                <span className="text-3xl">🔴</span>
                                                <h3 className="text-xl font-bold mt-2 text-red-600">فودافون مصر</h3>
                                                <p className="text-slate-400 text-sm font-medium">باقات فليكس وإنترنت هوائي</p>
                                            </button>
                                            <button onClick={() => setSelectedNet('etisalat')} className="bg-white p-6 rounded-2xl border-2 border-transparent card-anim shadow-sm text-right">
                                                <span className="text-3xl">🟢</span>
                                                <h3 className="text-xl font-bold mt-2 text-green-600">اتصالات من e&</h3>
                                                <p className="text-slate-400 text-sm font-medium">أقوى عروض الداتا والمكالمات</p>
                                            </button>
                                        </div>
                                    </div>
                                ) : (
                                    <div className="bg-white p-8 rounded-3xl shadow-lg border text-center">
                                        <button onClick={() => setSelectedNet(null)} className="text-blue-600 font-bold mb-4 block underline">← رجوع للشبكات</button>
                                        <div className="py-10">
                                            <div className="text-5xl mb-4">⌛</div>
                                            <h3 className="text-xl font-bold">جاري تحديث باقات {selectedNet === 'vodafone' ? 'فودافون' : 'اتصالات'}...</h3>
                                            <p className="text-slate-500 mt-2">سيتم عرض الباقات المتاحة فور إضافتها من لوحة التحكم.</p>
                                        </div>
                                    </div>
                                )}
                            </div>
                        ) : (
                            <div className="bg-white p-8 rounded-3xl shadow-xl border-t-8 border-blue-600">
                                <h2 className="text-2xl font-black mb-6">لوحة تحكم المسؤول ⚙️</h2>
                                <div className="grid grid-cols-2 gap-4 mb-8">
                                    <div className="bg-blue-50 p-6 rounded-2xl">
                                        <p className="text-blue-600 font-bold text-sm">إجمالي الطلبات</p>
                                        <p className="text-3xl font-black text-blue-900">0</p>
                                    </div>
                                    <div className="bg-green-50 p-6 rounded-2xl">
                                        <p className="text-green-600 font-bold text-sm">مبيعات اليوم</p>
                                        <p className="text-3xl font-black text-green-900">0 ج.م</p>
                                    </div>
                                </div>
                                <div className="bg-slate-50 p-6 rounded-2xl border-2 border-dashed border-slate-200 text-center">
                                    <p className="text-slate-400 font-bold">لا توجد طلبات شحن معلقة حالياً</p>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
